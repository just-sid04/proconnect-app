<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProConnect - Admin Login</title>
    <link rel="stylesheet" href="css/style.css?v=newtheme">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #F1F5F9;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(16,185,129,0.06) 0%, transparent 50%);
            -webkit-font-smoothing: antialiased;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Brand mark above the card */
        .login-logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .login-logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(99,102,241,0.3);
            margin-bottom: 12px;
        }

        .login-logo i {
            font-size: 22px;
            color: white;
            display: block;
            line-height: 52px;
        }

        .login-logo h1 {
            font-size: 22px;
            font-weight: 800;
            color: #0F172A;
            letter-spacing: -0.4px;
        }

        .login-logo p {
            font-size: 13px;
            color: #64748B;
            margin-top: 3px;
        }

        /* Card */
        .login-card {
            background: #FFFFFF;
            padding: 36px;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
            border: 1px solid #E2E8F0;
        }

        .login-card h2 {
            font-size: 20px;
            font-weight: 700;
            color: #0F172A;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .login-card .subtitle {
            color: #64748B;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 500;
            font-size: 13px;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #E2E8F0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: #0F172A;
            background: #FAFAFA;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }

        .form-group input::placeholder { color: #94A3B8; }

        .form-group input:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
            background: #FFFFFF;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #6366F1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
            box-shadow: 0 1px 3px rgba(99,102,241,0.3);
            letter-spacing: 0.1px;
        }

        .btn-login:hover {
            background: #4F46E5;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.35);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Divider */
        .login-divider {
            margin: 20px 0 0;
            text-align: center;
            font-size: 11px;
            color: #94A3B8;
            font-weight: 500;
        }

        .error-message {
            background: #FEF2F2;
            color: #DC2626;
            padding: 11px 14px;
            border-radius: 9px;
            font-size: 13px;
            margin-top: 14px;
            display: none;
            align-items: center;
            gap: 8px;
            border: 1px solid #FECACA;
        }

        .error-message.show { display: flex; }

        .loading-dots span {
            display: inline-block;
            animation: blink 1.4s infinite both;
        }
        .loading-dots span:nth-child(2) { animation-delay: .2s; }
        .loading-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-logo">
            <div class="login-logo-icon">
                <i class="fas fa-handshake"></i>
            </div>
            <h1>ProConnect</h1>
            <p style="margin-top: 5px;">Admin Dashboard</p>
        </div>

        <div class="login-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your admin account</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="admin@proconnect.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
                <div class="error-message" id="errorMsg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Invalid credentials</span>
                </div>
            </form>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        // Check if already logged in
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const errorText= document.getElementById('errorText');

            // Hide previous errors
            errorMsg.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Signing in<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                if (error) throw new Error(error.message);

                // Verify the user has admin role
                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role, name')
                    .eq('id', data.user.id)
                    .single();

                if (profileError || !profile) throw new Error('Could not load profile. Please try again.');
                if (profile.role !== 'admin') throw new Error('Access denied. Admin accounts only.');

                // Store minimal info for UI
                localStorage.setItem('adminUser', JSON.stringify({ name: profile.name, email: data.user.email }));
                window.location.href = 'index.html';

            } catch (err) {
                errorText.textContent = err.message || 'Unable to sign in. Please try again.';
                errorMsg.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
