<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProConnect - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #2196F3 50%, #764ba2 100%);
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
            color: white;
        }
        .login-logo i { font-size: 48px; margin-bottom: 12px; display: block; }
        .login-logo h1 { font-size: 28px; font-weight: 700; }
        .login-logo p { font-size: 14px; opacity: 0.8; margin-top: 4px; }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .login-card .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #374151;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #2196F3;
            box-shadow: 0 0 0 3px rgba(33,150,243,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2196F3, #1565C0);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(33,150,243,0.4); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .error-message.show { display: flex; }
        .loading-dots span {
            display: inline-block;
            animation: blink 1.4s infinite both;
        }
        .loading-dots span:nth-child(2) { animation-delay: .2s; }
        .loading-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-logo">
            <i class="fas fa-handshake"></i>
            <h1>ProConnect</h1>
            <p>Admin Dashboard</p>
        </div>

        <div class="login-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your admin account</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="admin@proconnect.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
                <div class="error-message" id="errorMsg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Invalid credentials</span>
                </div>
            </form>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        // Check if already logged in
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const errorText= document.getElementById('errorText');

            // Hide previous errors
            errorMsg.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Signing in<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                if (error) throw new Error(error.message);

                // Verify the user has admin role
                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role, name')
                    .eq('id', data.user.id)
                    .single();

                if (profileError || !profile) throw new Error('Could not load profile. Please try again.');
                if (profile.role !== 'admin') throw new Error('Access denied. Admin accounts only.');

                // Store minimal info for UI
                localStorage.setItem('adminUser', JSON.stringify({ name: profile.name, email: data.user.email }));
                window.location.href = 'index.html';

            } catch (err) {
                errorText.textContent = err.message || 'Unable to sign in. Please try again.';
                errorMsg.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
