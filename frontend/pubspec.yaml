name: proconnect
description: ProConnect - Smart Local Service Provider Platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Image handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Location services
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Maps
  google_maps_flutter: ^2.5.0
  
  # UI Components
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0
  intl: ^0.18.1
  
  # DateTime picker
  flutter_datetime_picker: ^1.5.1
  
  # Charts
  fl_chart: ^0.66.0
  
  # Supabase
  supabase_flutter: ^2.8.0

  # Typography
  google_fonts: ^6.1.0

  # Utilities
  uuid: ^4.2.2
  path_provider: ^2.1.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/